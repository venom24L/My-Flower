<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VIOLATE ECHOES</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; }
  body { background:#0a0010; display:flex; align-items:center; justify-content:center; font-family:monospace; user-select:none; }
  #scaleContainer { transform-origin:center center; }
  #gameWrapper { position:relative; width:800px; height:600px; border:2px solid #4a0070; box-shadow:0 0 40px #6a00aa55, 0 0 80px #3a005530; }
  #gameCanvas { display:block; width:800px; height:600px; image-rendering:pixelated; image-rendering:crisp-edges; cursor:crosshair; touch-action:none; }
  #titleScreen { position:absolute; inset:0; background:#0a0010; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
  .title-flicker { font-size:48px; color:#cc44ff; text-shadow:0 0 10px #aa00ff, 0 0 30px #6600cc; letter-spacing:6px; animation:flicker 3s infinite; font-weight:bold; }
  .title-sub { font-size:15px; color:#7722aa; margin-top:10px; letter-spacing:4px; }
  .title-tagline { font-size:13px; color:#9944cc; margin-top:8px; text-shadow:0 0 8px #6600cc; font-style:italic; }
  @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.3} 94%{opacity:1} 96%{opacity:0.7} 97%{opacity:1} }
  .btn-start { margin-top:38px; padding:14px 40px; background:#1a0030; border:2px solid #8800cc; color:#cc66ff; font-family:monospace; font-size:18px; cursor:pointer; letter-spacing:3px; transition:all 0.2s; }
  .btn-start:hover,.btn-start:active { background:#2a0050; border-color:#cc44ff; color:#fff; box-shadow:0 0 20px #8800cc; }
  .title-warning { margin-top:26px; font-size:11px; color:#552266; max-width:380px; text-align:center; line-height:1.6; }
  #endingScreen { position:absolute; inset:0; background:#000005; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:200; padding:36px; overflow-y:auto; }
  .ending-title { font-size:22px; margin-bottom:18px; text-align:center; font-family:monospace; letter-spacing:2px; }
  .ending-text { font-size:13px; line-height:2; text-align:center; max-width:600px; font-family:monospace; white-space:pre-line; }
  .ending-restart { margin-top:36px; padding:12px 28px; background:#0a0010; border:2px solid #663388; color:#9966bb; font-family:monospace; font-size:14px; cursor:pointer; letter-spacing:2px; }
  .ending-restart:hover,.ending-restart:active { background:#1a0030; color:#cc88ff; }
</style>
</head>
<body>
<div id="scaleContainer">
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="titleScreen">
    <div class="title-flicker">VIOLATE ECHOES</div>
    <div class="title-sub">a horror point &amp; click</div>
    <div class="title-tagline">you don't remember how you got here...</div>
    <button class="btn-start" id="btnStart">[ BEGIN ]</button>
    <button class="btn-start" id="btnLoad" style="margin-top:12px;font-size:14px;padding:10px 28px;">[ CONTINUE ]</button>
    <div class="title-warning">⚠ Contains disturbing content and psychological horror themes.<br>Recommended 16+</div>
  </div>
  <div id="endingScreen">
    <div class="ending-title" id="endingTitle"></div>
    <div class="ending-text" id="endingText"></div>
    <button class="ending-restart" onclick="location.reload()">[ PLAY AGAIN ]</button>
  </div>
</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ── RESPONSIVE ──────────────────────────────────────────────
const scaleCont=document.getElementById('scaleContainer');
function fit(){const s=Math.min(window.innerWidth/804,window.innerHeight/604);scaleCont.style.transform=`scale(${s})`;}
fit(); window.addEventListener('resize',fit); window.addEventListener('orientationchange',()=>setTimeout(fit,200));

// ── PALETTE ─────────────────────────────────────────────────
const P={black:'#050008',darkPurp:'#0d001a',purple:'#2d0050',lilac:'#4a1a6b',violet:'#7722aa',bright:'#cc88ff',white:'#e8d8ff'};

// ── GAME STATE ───────────────────────────────────────────────
const GS={
  currentRoom:'main', inventory:[], sanity:100, entitySeen:0,
  flags:{
    lampExamined:false,doorTried:false,coatExamined:false,noteFound:false,
    mirrorBroken:false,mirrorReflection:false,fridgeOpened:false,
    drawerCode:false,drawerUnlocked:false,secretRoomUnlocked:false,
    entityTalked:false,entityTalked2:false,entityTalked3:false,
    bloodWritingRead:false,boxOpened:false,photoFound:false,diaryRead:false,
    pillsTaken:false,pillsRefused:false,endingChoice:'',
    trueEndingUnlocked:false,cipherSolved:false,whisperHeard:false,
    bedChecked:false,kitchenNote:false,
  },
  save(){try{localStorage.setItem('ve2',JSON.stringify({r:this.currentRoom,inv:this.inventory,s:this.sanity,es:this.entitySeen,f:{...this.flags}}));}catch(e){}},
  load(){try{const d=JSON.parse(localStorage.getItem('ve2'));if(!d)return false;this.currentRoom=d.r;this.inventory=d.inv||[];this.sanity=d.s??100;this.entitySeen=d.es||0;Object.assign(this.flags,d.f||{});return true;}catch(e){return false;}}
};

// ── ITEMS ───────────────────────────────────────────────────
const Items={
  note:{id:'note',name:'Torn Note',desc:'Scrawled in shaking handwriting: "Don\'t look in the mirror... don\'t open the fridge... don\'t remember."',use:()=>showMsg('The note can\'t be used here.')},
  key:{id:'key',name:'Small Key',desc:'An old rusted key. It opens something small.',use:()=>showMsg('Try using it on something specific.')},
  photo:{id:'photo',name:'Old Photograph',desc:'A photo of a young girl in front of this exact apartment. Her face is erased... but her hand points at you.',use:()=>showMsg('The photograph feels horrifyingly familiar.')},
  pills:{id:'pills',name:'White Pills',desc:'Unlabeled pill bottle. Written in red pen: "Remember."',use:()=>{
    if(!GS.flags.pillsTaken&&!GS.flags.pillsRefused){
      showDlg([{text:'What will you do with the pills?',choices:[
        {text:'Swallow them',act:()=>{GS.flags.pillsTaken=true;GS.sanity=Math.min(100,GS.sanity+20);rmInv('pills');showMsg('...something returns... hazy memories seeping back...');GS.save();}},
        {text:'Throw them away',act:()=>{GS.flags.pillsRefused=true;rmInv('pills');showMsg('You throw the pills. The room feels more distorted.');GS.sanity=Math.max(0,GS.sanity-15);GS.save();}},
      ]}]);
    }
  }},
  diary:{id:'diary',name:'Black Diary',desc:'Old black notebook. One page remains: "You are not what you think you are."',use:()=>{
    GS.flags.diaryRead=true;GS.flags.trueEndingUnlocked=GS.flags.photoFound&&GS.flags.bloodWritingRead;
    showMsg('The diary contains one word repeated endlessly: "Look... look... look..."');GS.save();
  }},
  matchbox:{id:'matchbox',name:'Matchbox',desc:'Old matchbox. Three matches inside.',use:()=>{
    if(GS.currentRoom==='secret'&&!GS.flags.bloodWritingRead){GS.flags.bloodWritingRead=true;GS.sanity-=20;showMsg('You strike a match... the walls are covered in blood: "You killed them. You killed them. You killed them."');GS.save();}
    else if(GS.currentRoom==='bedroom') showMsg('Nothing to light here... there is enough darkness already.');
    else showMsg('You don\'t need the matches here.');
  }},
};
function rmInv(id){GS.inventory=GS.inventory.filter(i=>i!==id);}

// ── AUDIO ───────────────────────────────────────────────────
let ac=null;
function getAC(){if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ac;}
function beep(f=440,d=0.1,t='square',v=0.1){const a=getAC();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}
function sfxHorror(){beep(80,0.8,'sawtooth',0.08);}
function sfxClick(){beep(300,0.05,'square',0.05);}
function sfxPickup(){beep(600,0.1,'sine',0.07);setTimeout(()=>beep(800,0.1,'sine',0.07),100);}
function sfxWhisper(){[40,50,35,60].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sawtooth',0.05),i*200));}

// ── UI STATE ────────────────────────────────────────────────
const UI={
  mode:'explore', hoverHS:null, selectedItem:null,
  msg:'', msgTimer:0, dlg:null, puzzle:null,
  action:'examine', entityVis:false, entityAlpha:0, entityTimer:0,
  entityX:620, entityY:120, frame:0, invOpen:false,
  cipherIn:'', drawerIn:'',
};

// ── ROOMS ───────────────────────────────────────────────────
const Rooms={
  main:{
    name:'The Purple Room',
    hs:[
      {id:'door',lbl:'The Door',x:60,y:140,w:80,h:200,
        ex:()=>{GS.flags.doorTried=true;showMsg('The door is sealed shut. It doesn\'t move. As if it\'s fused to the wall.');GS.save();},
        us:()=>showMsg('The door won\'t open from this side.'),
        tk:()=>showMsg('The door is silent... but it seems to be breathing.'),
      },
      {id:'lamp',lbl:'Hanging Lamp',x:330,y:60,w:100,h:80,
        ex:()=>{GS.flags.lampExamined=true;showMsg('The lamp flickers strangely. A sliver of light reveals writing on the ceiling: "3-7-1"');GS.save();},
        us:()=>showMsg(GS.flags.lampExamined?'Ceiling numbers: 3-7-1. Maybe a code?':'Examine the lamp first.'),
        tk:()=>showMsg('...whoooosh... the light whispers.'),
      },
      {id:'coat',lbl:'Coat Rack',x:680,y:140,w:80,h:200,
        ex:()=>{GS.flags.coatExamined=true;if(!GS.flags.noteFound){GS.flags.noteFound=true;GS.inventory.push('note');sfxPickup();showMsg('A note in the old coat pocket! [Added: Torn Note]');}else{showMsg('A worn coat. Its smell is unsettlingly familiar.');}GS.save();},
        us:()=>showMsg('The coat doesn\'t fit you... or maybe it does.'),
        tk:()=>showMsg('...no one has worn this coat in a long time...'),
      },
      {id:'floor_item',lbl:'Something on Floor',x:280,y:430,w:60,h:40,
        ex:()=>{if(!GS.inventory.includes('matchbox')){GS.inventory.push('matchbox');sfxPickup();showMsg('An old matchbox! [Added: Matchbox]');GS.save();}else{showMsg('Strange violet dust covers the floor.');}},
        us:()=>showMsg('Nothing to use here.'),tk:()=>showMsg('...'),
      },
      {id:'window',lbl:'Covered Window',x:180,y:170,w:120,h:120,
        ex:()=>{GS.sanity-=5;showMsg('A window covered in black cloth. You lifted it... your reflection didn\'t move with you.');},
        us:()=>showMsg('The cloth is stuck to the glass.'),
        tk:()=>showMsg('...what do you see beyond the window? Nothing. Absolutely nothing.'),
      },
      {id:'to_bedroom',lbl:'Bedroom →',x:700,y:350,w:90,h:120,
        ex:()=>showMsg('A passage to the bedroom.'),
        us:()=>{sfxClick();changeRoom('bedroom');},tk:()=>showMsg('...'),
      },
    ]
  },
  bedroom:{
    name:'The Bedroom',
    hs:[
      {id:'bed',lbl:'Old Bed',x:80,y:250,w:250,h:160,
        ex:()=>{GS.flags.bedChecked=true;if(!GS.inventory.includes('diary')){GS.inventory.push('diary');sfxPickup();showMsg('Under the pillow... a black diary. [Added: Black Diary]');GS.save();}else{showMsg('The bed is cold. As if never slept in.');}},
        us:()=>{showMsg('You tried to sleep... you see the faceless one... you snap awake.');GS.sanity-=10;},
        tk:()=>showMsg('The bed groans softly...'),
      },
      {id:'mirror',lbl:'Broken Mirror',x:380,y:120,w:160,h:280,
        ex:()=>{if(!GS.flags.mirrorBroken){GS.flags.mirrorBroken=true;showMsg('The mirror is shattered. Its shards reflect a face that isn\'t yours. Eyes completely black.');GS.sanity-=15;sfxHorror();}else if(!GS.flags.mirrorReflection){GS.flags.mirrorReflection=true;showMsg('In one shard... a word carved: "ECHO". What does it mean?');}else{showMsg('The mirror reflects a different room... darkness and an open door.');}GS.save();},
        us:()=>showMsg(GS.inventory.includes('key')?'You scratch the key across the mirror... a hidden number: "3". First digit confirmed!':'Don\'t touch the shards with bare hands.'),
        tk:()=>{showMsg('...who are you? Who are you really?...');GS.sanity-=5;},
      },
      {id:'box',lbl:'Box Under Bed',x:80,y:420,w:120,h:50,
        ex:()=>showMsg(GS.flags.boxOpened?'The box is empty.':'A locked box. Needs a small key.'),
        us:()=>{if(GS.inventory.includes('key')&&!GS.flags.boxOpened){GS.flags.boxOpened=true;GS.inventory.push('photo');sfxPickup();showMsg('The box opens! Inside, an old photograph. [Added: Old Photograph]');if(GS.flags.diaryRead)GS.flags.trueEndingUnlocked=true;GS.save();}else if(!GS.inventory.includes('key')){showMsg('The box is locked. You need a key.');}else{showMsg('The box is empty.');}},
        tk:()=>showMsg('Something inside is breathing...'),
      },
      {id:'to_main_b',lbl:'← Back',x:680,y:400,w:100,h:80,
        ex:()=>showMsg('Exit the bedroom.'),us:()=>{sfxClick();changeRoom('main');},tk:()=>showMsg('...'),
      },
      {id:'to_kitchen',lbl:'Kitchen →',x:680,y:280,w:100,h:100,
        ex:()=>showMsg('Passage to the kitchen.'),us:()=>{sfxClick();changeRoom('kitchen');},tk:()=>showMsg('...'),
      },
    ]
  },
  kitchen:{
    name:'The Kitchen',
    hs:[
      {id:'fridge',lbl:'Old Fridge',x:60,y:130,w:130,h:280,
        ex:()=>{if(!GS.flags.fridgeOpened){GS.flags.fridgeOpened=true;GS.sanity-=20;sfxHorror();showMsg('You open the fridge... completely empty except a photo pinned with a magnet. Face erased. Written below: "I\'m here."');GS.save();}else{showMsg('The fridge is dark. No electricity. No cold. No life.');}},
        us:()=>{if(!GS.flags.fridgeOpened){showMsg('Examine the fridge first.');}else if(!GS.inventory.includes('pills')){GS.inventory.push('pills');sfxPickup();showMsg('In a small drawer inside the fridge... pills! [Added: White Pills]');GS.save();}else{showMsg('Nothing else in the fridge.');}},
        tk:()=>showMsg('...you were here... you were always here...'),
      },
      {id:'drawer',lbl:'Kitchen Drawer',x:260,y:330,w:180,h:80,
        ex:()=>{if(!GS.flags.drawerCode){showMsg('The drawer is locked with a 3-digit code. Look around...');GS.flags.drawerCode=true;}else if(!GS.flags.drawerUnlocked){showMsg('3-digit code. Hint: the lamp, the mirror key scratch, and the first secret room finding.');}else{showMsg('The drawer is open. Already taken.');}},
        us:()=>{if(!GS.flags.drawerUnlocked){if(GS.flags.lampExamined)startDrawer();else showMsg('Need to know the code. Search the purple room.');}else{showMsg('The drawer is empty.');}},
        tk:()=>showMsg('...the numbers... do you remember?...'),
      },
      {id:'plates',lbl:'Broken Plates',x:500,y:360,w:180,h:100,
        ex:()=>{showMsg('Broken plates arranged in a circle. In the center, written in dried blood: "LEAVE"');GS.sanity-=10;if(!GS.flags.kitchenNote){GS.flags.kitchenNote=true;GS.save();}},
        us:()=>showMsg('Don\'t touch the shards... it will hurt.'),
        tk:()=>showMsg('...an echo from an old kitchen...'),
      },
      {id:'kwindow',lbl:'Kitchen Window',x:350,y:80,w:150,h:130,
        ex:()=>showMsg('The window looks out onto... nothing. A black wall. No sky. No light.'),
        us:()=>showMsg('The window won\'t open.'),tk:()=>showMsg('...'),
      },
      {id:'to_main_k',lbl:'← Back',x:680,y:420,w:100,h:80,
        ex:()=>showMsg('Return to main room.'),us:()=>{sfxClick();changeRoom('main');},tk:()=>showMsg('...'),
      },
      {id:'secret_door',lbl:'Hidden Door',x:60,y:430,w:80,h:100,
        ex:()=>showMsg(GS.flags.secretRoomUnlocked?'The secret room door is open... something inside is pulling at you.':'A damp wall... wait. Is that a hidden door?'),
        us:()=>{if(GS.flags.secretRoomUnlocked){sfxHorror();changeRoom('secret');}else if(GS.flags.drawerUnlocked&&GS.inventory.includes('key')){GS.flags.secretRoomUnlocked=true;sfxHorror();showMsg('The hidden door opens! Cold air breathes from inside...');GS.save();}else if(GS.flags.drawerUnlocked){showMsg('There is a keyhole here...');}else{showMsg('Just a wall. Or so it seems.');}},
        tk:()=>showMsg(GS.flags.secretRoomUnlocked?'...welcome back...':'...'),
      },
    ]
  },
  secret:{
    name:'The Forgotten Room',
    hs:[
      {id:'blood_wall',lbl:'Writing on Wall',x:100,y:100,w:350,h:300,
        ex:()=>{showMsg('The walls are covered in dried blood writing. One name repeats endlessly... your name.');GS.sanity-=20;if(GS.inventory.includes('matchbox'))showMsg('Use the matchbox to see the full writing.');GS.save();},
        us:()=>showMsg('Try the matchbox if you have it.'),
        tk:()=>{showMsg('...we didn\'t let you leave last time... we won\'t let you this time...');GS.sanity-=10;},
      },
      {id:'altar',lbl:'Strange Altar',x:480,y:200,w:220,h:220,
        ex:()=>{GS.flags.photoFound=true;showMsg('An altar covered in photos, dolls, and burned candles. All depicting a young girl... depicting you. This room was built around you.');if(GS.flags.diaryRead)GS.flags.trueEndingUnlocked=true;GS.save();},
        us:()=>showMsg(GS.flags.trueEndingUnlocked?'Everything is clear now. You didn\'t come here. You were created here.':'Something on the altar draws you... but you\'re not ready.'),
        tk:()=>{showMsg('...this is your place. Here you began. Here you will end...');GS.sanity-=15;GS.save();},
      },
      {id:'cipher',lbl:'Cipher Puzzle',x:100,y:430,w:250,h:80,
        ex:()=>showMsg('Strange symbols on the floor in a circle. Decode it. (A=1, B=2, C=3... The word: 5-3-8-15)'),
        us:()=>{if(!GS.flags.cipherSolved)startCipher();else showMsg('Cipher solved. The final door is open.');},
        tk:()=>showMsg('...the numbers sing... 5-3-8-15...'),
      },
      {id:'entity_s',lbl:'The Entity...',x:580,y:80,w:100,h:200,
        ex:()=>{if(UI.entityVis){showMsg('Its face is empty... but you feel it seeing you. Seeing inside you.');GS.sanity-=15;}else{showMsg('Something was standing here. The air is still cold.');}},
        us:()=>showMsg('Don\'t get any closer...'),
        tk:()=>{if(!GS.flags.entityTalked3){GS.flags.entityTalked3=true;showEntityDlg3();}else{showMsg('...everything has been said... now choose...');}},
      },
      {id:'final_door',lbl:'The Final Door',x:680,y:200,w:80,h:250,
        ex:()=>showMsg(GS.flags.cipherSolved?'The door is open... the light from the other side isn\'t ordinary.':'A sealed door. Something holds it shut from within.'),
        us:()=>{if(GS.flags.cipherSolved)triggerEnding();else showMsg('Solve the cipher first.');},
        tk:()=>showMsg('...what will you choose?...'),
      },
      {id:'back_s',lbl:'← Back',x:10,y:480,w:70,h:80,
        ex:()=>showMsg('Go back...'),us:()=>{sfxClick();changeRoom('kitchen');},tk:()=>showMsg('...'),
      },
    ]
  },
};

// ── ENTITY DIALOGUES ─────────────────────────────────────────
function showEntityDlg1(){
  GS.flags.entityTalked=true;GS.sanity-=10;sfxWhisper();
  showDlg([
    {text:'...you found me...'},
    {text:'...or perhaps I found you...'},
    {text:'...do you remember your face? Your real face?...'},
    {text:'...',choices:[
      {text:'Who are you?',act:()=>{showMsg('...I am the echo of what you forgot...');GS.save();}},
      {text:'Go away!',act:()=>{showMsg('It smiles... with no mouth... and vanishes.');UI.entityVis=false;GS.save();}},
      {text:'What do you want?',act:()=>{showMsg('...I want you to remember... before it\'s too late...');GS.flags.whisperHeard=true;GS.save();}},
    ]}
  ]);
}
function showEntityDlg2(){
  GS.flags.entityTalked2=true;GS.sanity-=15;sfxWhisper();
  showDlg([
    {text:'...you returned...'},
    {text:'...you found the clues... didn\'t you?...'},
    {text:'...the photos... the diary... the blood on the walls...'},
    {text:'...the truth won\'t set you free...',choices:[
      {text:'What IS the truth?',act:()=>showMsg('...you didn\'t come here by accident... you are here because you are you...')},
      {text:'I don\'t want to know.',act:()=>{showMsg('...then you will stay here forever...');GS.flags.endingChoice='denial';GS.save();}},
    ]}
  ]);
}
function showEntityDlg3(){
  GS.sanity-=20;sfxWhisper();
  showDlg([
    {text:'...the secret room revealed everything...'},
    {text:'...your world has been turned upside down...'},
    {text:'...now you know who you truly are...'},
    {text:'...what will you choose?...',choices:[
      {text:'Accept the truth',act:()=>{GS.flags.endingChoice='accept';showMsg('...good... then open the final door...');GS.save();}},
      {text:'Reject everything',act:()=>{GS.flags.endingChoice='deny';showMsg('...you close your eyes... but truth doesn\'t disappear...');GS.save();}},
      {text:'Try to escape',act:()=>{GS.flags.endingChoice='escape';showMsg('...there is no escape... this apartment... is you...');GS.save();}},
    ]}
  ]);
}

// ── ENTITY SPAWN ─────────────────────────────────────────────
function trySpawn(){
  if(UI.entityVis||UI.mode!=='explore')return;
  if(Math.random()<0.002+GS.entitySeen*0.0003){
    UI.entityVis=true;UI.entityTimer=180+Math.random()*240;GS.entitySeen++;sfxWhisper();
    UI.entityX=GS.currentRoom==='main'?580+Math.random()*80:GS.currentRoom==='bedroom'?540+Math.random()*80:GS.currentRoom==='kitchen'?520+Math.random()*80:600;
    UI.entityY=80+Math.random()*100;
  }
}

// ── DRAW ROOMS ───────────────────────────────────────────────
function drawScene(){
  const r=GS.currentRoom;
  if(r==='main')drawMain();else if(r==='bedroom')drawBedroom();else if(r==='kitchen')drawKitchen();else drawSecret();
  // hotspot highlight
  const hs=Rooms[r]?.hs||[];
  hs.forEach(h=>{
    if(UI.hoverHS===h.id){ctx.fillStyle='rgba(200,100,255,0.10)';ctx.strokeStyle='#aa44ff';ctx.lineWidth=1;ctx.fillRect(h.x,h.y,h.w,h.h);ctx.strokeRect(h.x,h.y,h.w,h.h);}
  });
  if(UI.hoverHS){
    const h=hs.find(h=>h.id===UI.hoverHS);
    if(h){ctx.font='11px monospace';const tw=ctx.measureText(h.lbl).width,cx=h.x+h.w/2,cy=h.y-8;ctx.fillStyle='rgba(10,0,20,0.85)';ctx.fillRect(cx-tw/2-4,cy-14,tw+8,18);ctx.fillStyle='#cc88ff';ctx.textAlign='center';ctx.fillText(h.lbl,cx,cy);ctx.textAlign='left';}
  }
}

function drawMain(){

  const fg=ctx.createRadialGradient(87,356,0,87,356,17);fg.addColorStop(0,'rgba(80,0,120,0.5)');fg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fg;ctx.fillRect(70,335,34,42);
  const line=dlg.lines[dlg.idx];if(!line)return;
  const lines=wrap(line.text,60);ctx.fillStyle='#e8d8ff';ctx.font='13px monospace';lines.forEach((l,i)=>ctx.fillText(l,130,355+i*20));
  if(line.choices){
    line.choices.forEach((c,i)=>{const y=415+i*30;ctx.fillStyle='#0d001a';ctx.fillRect(130,y-18,540,26);ctx.strokeStyle='#4a1a6b';ctx.lineWidth=1;ctx.strokeRect(130,y-18,540,26);ctx.fillStyle='#aa55cc';ctx.font='12px monospace';ctx.fillText(`${i+1}. ${c.text}`,140,y);});
  } else {ctx.fillStyle='#3a1a5a';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText('[ tap to continue ]',745,528);ctx.textAlign='left';}
}

// ── POST FX ──────────────────────────────────────────────────
function drawFX(){
  ctx.globalAlpha=0.04;for(let y=0;y<600;y+=4){ctx.fillStyle='#000';ctx.fillRect(0,y,800,2);}ctx.globalAlpha=1;
  if(GS.sanity<50&&Math.random()<0.03){const gy=Math.floor(Math.random()*500),gh=2+Math.floor(Math.random()*6),gx=Math.floor(Math.random()*40);ctx.globalAlpha=0.5;ctx.drawImage(canvas,0,gy,800,gh,gx,gy,800,gh);ctx.globalAlpha=1;}
  const vig=ctx.createRadialGradient(400,300,150,400,300,500);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,20,0.7)');ctx.fillStyle=vig;ctx.fillRect(0,0,800,600);
  if(GS.sanity<30){ctx.fillStyle=`rgba(80,0,30,${(30-GS.sanity)/100})`;ctx.fillRect(0,0,800,600);}
}

// ── DIALOGUE / MSG ───────────────────────────────────────────
function showDlg(lines){UI.mode='dialogue';UI.dlg={lines,idx:0};UI.invOpen=false;}
function showMsg(msg){if(!msg)return;UI.mode='message';UI.msg=msg;UI.msgTimer=400;}
function advDlg(){const d=UI.dlg;if(!d)return;if(d.lines[d.idx]?.choices)return;d.idx++;if(d.idx>=d.lines.length){UI.mode='explore';UI.dlg=null;}}

// ── PUZZLES ──────────────────────────────────────────────────
function startDrawer(){UI.mode='puzzle';UI.puzzle='drawer';UI.drawerIn='';UI.invOpen=false;}
function startCipher(){UI.mode='puzzle';UI.puzzle='cipher';UI.cipherIn='';UI.invOpen=false;}
function checkDrawer(){
  if(UI.drawerIn==='371'){GS.flags.drawerUnlocked=true;if(!GS.inventory.includes('key')){GS.inventory.push('key');sfxPickup();}UI.mode='message';UI.msg='Correct! The drawer opens... inside, a small rusted key. [Added: Small Key]';UI.msgTimer=500;UI.puzzle=null;GS.save();}
  else{UI.drawerIn='';UI.msg='Wrong code... try again.';UI.mode='message';UI.msgTimer=200;UI.puzzle=null;beep(150,0.3,'square',0.1);setTimeout(startDrawer,800);}
}
function checkCipher(){
  if(['echo','ECHO'].includes(UI.cipherIn.trim())){GS.flags.cipherSolved=true;UI.mode='message';UI.msg='"ECHO"... The word is "ECHO"... the cipher answers itself... the final door shudders open.';UI.msgTimer=500;UI.puzzle=null;sfxPickup();GS.save();}
  else{UI.cipherIn='';UI.msg='Wrong. Try again. (5=E, 3=C, 8=H, 15=O)';UI.mode='message';UI.msgTimer=300;UI.puzzle=null;beep(150,0.3,'square',0.1);setTimeout(startCipher,1000);}
}

// ── ENDINGS ──────────────────────────────────────────────────
const Ends={
  true:{title:'✦ TRUE ENDING: The Echo Freed ✦',color:'#cc88ff',text:`You remember everything now.\n\nYou were here before. Not once... but thousands of times.\nEvery time, you forgot. Every time, you started over.\n\nBut this time... you read the diary. You found the photograph.\nYou lit the match and saw the walls.\nAnd you solved the cipher that said: "ECHO."\n\nECHO. That is your name. The only thing they never erased.\n\nThe entity stands before you. It doesn't move.\nFor the first time... it seems afraid.\n\n"You cannot leave." it whispers.\n\nYou walk toward the door. Your hand on the handle.\n\n"You will come back."\n\nYou open the door.\nReal light. Real air.\n\nAnd for the first time in countless lifetimes...\n\nYou are free.`},
  memory:{title:'◈ MEMORY ENDING: Acceptance ◈',color:'#aa55cc',text:`You chose to accept.\n\nThe entity nods slowly. Its hollow face seems... at peace.\n\n"Finally." it says.\n\nYou sit in the purple room. The lamp flickers.\nThe walls breathe. But you are no longer afraid.\n\nBecause now you know: this room is a part of you.\nAnd you are a part of it.\n\nThe door is still locked.\nBut you've stopped trying to open it.\n\nSome prisons become home.\nWhen you stop fighting them.`},
  denial:{title:'▽ DENIAL ENDING: The Forgetting ▽',color:'#6633aa',text:`You rejected everything.\n\nYou closed your eyes. You wished to forget.\n\nAnd the wish came true.\n\nYou wake up in a purple apartment.\nYou don't know how you got here.\nThe door is locked. The lamp flickers.\nAn old coat hangs on the rack...\n\nYou begin again.\n\nAs you have begun a thousand times before this.\n\nThe entity watches you from the corner.\nAnd smiles. With no mouth.`},
  escape:{title:'⊘ ESCAPE ENDING: The Lost One ⊘',color:'#331155',text:`You ran. With everything you had.\n\nThe doors multiply. The rooms loop.\nThe kitchen leads to the purple room.\nThe bedroom leads to the kitchen. And so on. Forever.\n\nThe entity doesn't follow you.\nIt doesn't need to.\n\nBecause this apartment... isn't built in space.\n\nIt is built inside you.\n\nAnd wherever you go...\n\nYou will carry it with you.`},
};
function triggerEnding(){
  let k;
  if(GS.flags.trueEndingUnlocked&&GS.flags.pillsTaken&&GS.flags.diaryRead&&GS.flags.photoFound)k='true';
  else if(GS.flags.endingChoice==='accept'||GS.flags.pillsTaken)k='memory';
  else if(GS.flags.endingChoice==='deny'||GS.flags.pillsRefused)k='denial';
  else k='escape';
  const e=Ends[k];
  const sc=document.getElementById('endingScreen');sc.style.display='flex';
  document.getElementById('endingTitle').style.cssText=`color:${e.color};text-shadow:0 0 20px ${e.color};font-family:monospace`;
  document.getElementById('endingTitle').textContent=e.title;
  document.getElementById('endingText').style.cssText=`color:${e.color};font-family:monospace`;
  document.getElementById('endingText').textContent=e.text;
  localStorage.removeItem('ve2');sfxHorror();
}

// ── ROOM CHANGE ──────────────────────────────────────────────
function changeRoom(id){
  if(!Rooms[id])return;
  GS.currentRoom=id;UI.hoverHS=null;UI.entityVis=false;UI.entityAlpha=0;
  if(id==='bedroom'&&!GS.flags.entityTalked&&GS.entitySeen===0){setTimeout(()=>{UI.entityVis=true;UI.entityAlpha=0;UI.entityTimer=300;UI.entityX=550;UI.entityY=100;GS.entitySeen++;sfxWhisper();setTimeout(()=>{if(!GS.flags.entityTalked)showEntityDlg1();},2000);},1500);}
  if(id==='kitchen'&&GS.flags.mirrorBroken&&!GS.flags.entityTalked2){setTimeout(()=>{UI.entityVis=true;UI.entityAlpha=0;UI.entityTimer=300;UI.entityX=620;UI.entityY=90;GS.entitySeen++;sfxWhisper();setTimeout(()=>{if(!GS.flags.entityTalked2)showEntityDlg2();},1500);},2000);}
  GS.save();
}

// ── INPUT ────────────────────────────────────────────────────
function getPos(e){
  const r=canvas.getBoundingClientRect(),src=e.changedTouches?e.changedTouches[0]:e;
  return{mx:(src.clientX-r.left)*(800/r.width),my:(src.clientY-r.top)*(600/r.height)};
}
function handleInput(e){
  e.preventDefault();
  if(ac&&ac.state==='suspended')ac.resume();
  const{mx,my}=getPos(e);

  if(UI.mode==='message'){UI.mode='explore';UI.msgTimer=0;return;}
  if(UI.mode==='dialogue'){
    const d=UI.dlg;if(!d)return;
    const line=d.lines[d.idx];
    if(line?.choices){line.choices.forEach((c,i)=>{const y=415+i*30;if(mx>=130&&mx<=670&&my>=y-18&&my<=y+8){c.act?.();d.idx++;if(d.idx>=d.lines.length){UI.mode='explore';UI.dlg=null;}}});}
    else advDlg();
    return;
  }
  if(UI.mode==='puzzle'){if(UI.puzzle==='drawer')drawerClick(mx,my);else cipherClick(mx,my);return;}
  if(UI.invOpen){
    if(my>=546&&mx>=372&&mx<=487){UI.invOpen=false;return;}
    GS.inventory.forEach((id,i)=>{
      const col=i%3,row=Math.floor(i/3),x=75+col*220,y=130+row*140;
      if(mx>=x&&mx<=x+205&&my>=y&&my<=y+90)UI.selectedItem=(UI.selectedItem===id?null:id);
      if(mx>=x+60&&mx<=x+135&&my>=y+102&&my<=y+120){Items[id]?.use?.();UI.invOpen=false;}
    });
    return;
  }
  if(UI.entityVis){const ex=UI.entityX,ey=UI.entityY;if(mx>=ex-40&&mx<=ex+40&&my>=ey&&my<=ey+200){if(!GS.flags.entityTalked)showEntityDlg1();else if(!GS.flags.entityTalked2)showEntityDlg2();else if(!GS.flags.entityTalked3&&GS.currentRoom==='secret')showEntityDlg3();else showMsg('...the entity stares at you in complete silence...');return;}}
  // HUD buttons
  if(my>=546&&my<=588){
    if(mx>=8&&mx<=102){UI.action='examine';return;}
    if(mx>=108&&mx<=202){UI.action='use';return;}
    if(mx>=188&&mx<=282){UI.action='take';return;}
    if(mx>=268&&mx<=362){UI.action='talk';return;}
    if(mx>=372&&mx<=487){UI.invOpen=!UI.invOpen;return;}
    if(mx>=497&&mx<=562){GS.save();showMsg('Game saved.');return;}
  }
  // Hotspots
  const hs=Rooms[GS.currentRoom]?.hs||[];
  for(const h of hs){if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){sfxClick();switch(UI.action){case'examine':h.ex?.();break;case'use':h.us?.();break;case'take':h.ex?.();break;case'talk':h.tk?.();break;}return;}}
}
function drawerClick(mx,my){
  for(let i=1;i<=9;i++){const col=(i-1)%3,row=Math.floor((i-1)/3),bx=242+col*80,by=292+row*50;if(mx>=bx&&mx<=bx+68&&my>=by&&my<=by+42&&UI.drawerIn.length<3){UI.drawerIn+=String(i);beep(400+i*30,0.08,'square',0.06);if(UI.drawerIn.length===3)checkDrawer();}}
  if(mx>=242&&mx<=310&&my>=442&&my<=474&&UI.drawerIn.length<3){UI.drawerIn+='0';beep(400,0.08,'square',0.06);if(UI.drawerIn.length===3)checkDrawer();}
  if(mx>=322&&mx<=422&&my>=442&&my<=474){UI.drawerIn='';beep(200,0.08,'square',0.04);}
  if(mx>=434&&mx<=514&&my>=442&&my<=474){UI.mode='explore';UI.puzzle=null;}
}
function cipherClick(mx,my){
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach((l,i)=>{const col=i%9,row=Math.floor(i/9),bx=130+col*56,by=262+row*46;if(mx>=bx&&mx<=bx+50&&my>=by&&my<=by+38&&UI.cipherIn.length<8){UI.cipherIn+=l;beep(400+i*10,0.06,'sine',0.05);}});
  if(mx>=165&&mx<=275&&my>=424&&my<=460)checkCipher();
  if(mx>=290&&mx<=390&&my>=424&&my<=460)UI.cipherIn='';
  if(mx>=405&&mx<=485&&my>=424&&my<=460){UI.mode='explore';UI.puzzle=null;}
}
canvas.addEventListener('mousemove',e=>{
  if(UI.mode!=='explore'){UI.hoverHS=null;return;}
  const r=canvas.getBoundingClientRect(),mx=(e.clientX-r.left)*(800/r.width),my=(e.clientY-r.top)*(600/r.height);
  const hs=Rooms[GS.currentRoom]?.hs||[];UI.hoverHS=null;
  for(const h of hs){if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){UI.hoverHS=h.id;break;}}
});
canvas.addEventListener('click',handleInput);
canvas.addEventListener('touchend',handleInput,{passive:false});
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

// ── HELPERS ──────────────────────────────────────────────────
function wrap(text,max){const words=text.split(' '),lines=[];let cur='';words.forEach(w=>{if((cur+w).length>max&&cur){lines.push(cur.trim());cur=w+' ';}else cur+=w+' ';});if(cur.trim())lines.push(cur.trim());return lines;}

// ── LOOP ─────────────────────────────────────────────────────
function loop(){
  UI.frame++;
  if(UI.entityVis){UI.entityAlpha=Math.min(0.9,UI.entityAlpha+0.02);UI.entityTimer--;if(UI.entityTimer<=0&&UI.mode!=='dialogue'){UI.entityAlpha-=0.02;if(UI.entityAlpha<=0){UI.entityVis=false;UI.entityAlpha=0;}}}else trySpawn();
  if(UI.mode==='message')UI.msgTimer-=0.5;
  ctx.fillStyle=P.black;ctx.fillRect(0,0,800,600);
  drawScene();
  if(UI.mode!=='puzzle')drawChar();
  drawEntity();
  drawHUD();
  drawFX();
  requestAnimationFrame(loop);
}

// ── START ────────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click',()=>{
  document.getElementById('titleScreen').style.display='none';
  if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  GS.currentRoom='main';GS.inventory=[];GS.sanity=100;GS.entitySeen=0;
  GS.flags={lampExamined:false,doorTried:false,coatExamined:false,noteFound:false,mirrorBroken:false,mirrorReflection:false,fridgeOpened:false,drawerCode:false,drawerUnlocked:false,secretRoomUnlocked:false,entityTalked:false,entityTalked2:false,entityTalked3:false,bloodWritingRead:false,boxOpened:false,photoFound:false,diaryRead:false,pillsTaken:false,pillsRefused:false,endingChoice:'',trueEndingUnlocked:false,cipherSolved:false,whisperHeard:false,bedChecked:false,kitchenNote:false};
  beep(80,1.5,'sawtooth',0.06);
  setTimeout(()=>showMsg('You wake up in a purple-tinted apartment. You remember nothing. The door is locked. The lamp flickers above your head...'),500);
  loop();
});
document.getElementById('btnLoad').addEventListener('click',()=>{
  if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(GS.load()){document.getElementById('titleScreen').style.display='none';beep(200,0.3,'sine',0.06);setTimeout(()=>showMsg('Game loaded. Welcome back...'),300);loop();}
  else{document.getElementById('btnLoad').textContent='[ NO SAVE FOUND ]';setTimeout(()=>{document.getElementById('btnLoad').textContent='[ CONTINUE ]';},2000);}
});
['btnStart','btnLoad'].forEach(id=>{document.getElementById(id).addEventListener('touchend',e=>{e.preventDefault();document.getElementById(id).click();},{passive:false});});
</script>
