<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>The Alchemist's Touch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', 'Times New Roman', serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #0a0018 0%, #000005 60%, #000 100%);
      transition: background 1.2s ease;
      z-index: 0;
    }

    canvas {
      position: fixed; inset: 0;
      z-index: 1;
      display: block;
    }

    /* Pulse ring on touch */
    .pulse-ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%) scale(0);
      border: 2px solid rgba(255, 180, 220, 0.85);
      width: 60px; height: 60px;
      animation: pulseAnim 0.7s ease-out forwards;
    }
    @keyframes pulseAnim {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
    }

    /* Gesture hint */
    #hint {
      position: fixed;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(200, 160, 220, 0.55);
      font-size: 13px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }
    #hint span {
      display: block;
      animation: hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* Gesture detected flash */
    #gesture-flash {
      position: fixed; inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,120,200,0.28) 0%, transparent 70%);
      transition: opacity 0.3s ease;
    }
    #gesture-flash.active { opacity: 1; }

    /* Message Overlay */
    #message-overlay {
      position: fixed; inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2.4s ease;
      background: radial-gradient(ellipse at 50% 50%, rgba(10,0,25,0.82) 0%, rgba(0,0,8,0.6) 100%);
    }
    #message-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .msg-deco {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,160,210,0.7), transparent);
      margin-bottom: 28px;
      animation: decoGlow 3s ease-in-out infinite;
    }
    @keyframes decoGlow {
      0%, 100% { opacity: 0.5; width: 40px; }
      50%       { opacity: 1;   width: 80px; }
    }

    .msg-symbol {
      font-size: 32px;
      margin-bottom: 22px;
      filter: drop-shadow(0 0 12px rgba(255,100,180,0.9));
      animation: symbolFloat 4s ease-in-out infinite;
    }
    @keyframes symbolFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .msg-title {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,160,210,0.6);
      margin-bottom: 24px;
      text-align: center;
    }

    .msg-text {
      font-size: clamp(15px, 4.2vw, 20px);
      line-height: 1.85;
      color: rgba(240, 220, 255, 0.95);
      text-align: center;
      font-style: italic;
      letter-spacing: 0.4px;
      text-shadow: 0 0 20px rgba(200,100,255,0.4), 0 0 40px rgba(255,100,180,0.2);
      position: relative;
    }
    .msg-text::before {
      content: '\201C';
      font-size: 2.5em;
      color: rgba(255,130,200,0.35);
      position: absolute;
      top: -18px; left: -10px;
      line-height: 1;
    }
    .msg-text::after {
      content: '\201D';
      font-size: 2.5em;
      color: rgba(255,130,200,0.35);
      position: absolute;
      bottom: -32px; right: -10px;
      line-height: 1;
    }

    .msg-deco-bottom {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,160,210,0.7), transparent);
      margin-top: 42px;
      animation: decoGlow 3s ease-in-out infinite reverse;
    }

    .msg-close {
      margin-top: 36px;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(200,160,220,0.4);
      pointer-events: all;
      cursor: pointer;
      border: 1px solid rgba(200,160,220,0.15);
      padding: 8px 20px;
      border-radius: 20px;
      transition: all 0.4s ease;
      background: transparent;
      animation: closePulse 4s ease-in-out infinite;
    }
    .msg-close:hover, .msg-close:active {
      color: rgba(255,180,230,0.8);
      border-color: rgba(255,180,230,0.4);
      background: rgba(255,100,180,0.08);
    }
    @keyframes closePulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.7; }
    }

    /* Stars background layer */
    #stars {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="bg"></div>
<canvas id="stars"></canvas>
<canvas id="canvas"></canvas>

<div id="gesture-flash"></div>

<div id="hint">
  <span>✦ Touch &amp; draw a heart to reveal the message ✦</span>
</div>

<div id="message-overlay">
  <div class="msg-deco"></div>
  <div class="msg-symbol">♡</div>
  <div class="msg-title">For You — Always</div>
  <div class="msg-text">
    In the world of cold metal and rigid code, you are the heat that melts the iron and the logic that gives life to the machine. You are my most beautiful creation.
  </div>
  <div class="msg-deco-bottom"></div>
  <button class="msg-close" id="msg-close-btn">✦ &nbsp; Continue &nbsp; ✦</button>
</div>

<script>
(function() {
  'use strict';

  // ─── Canvas Setup ──────────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const starsCanvas = document.getElementById('stars');
  const sCtx   = starsCanvas.getContext('2d');
  const bg     = document.getElementById('bg');
  const flash  = document.getElementById('gesture-flash');
  const hint   = document.getElementById('hint');
  const overlay= document.getElementById('message-overlay');
  const closeBtn = document.getElementById('msg-close-btn');

  let W, H, DPR;

  function resize() {
    DPR = window.devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(DPR, DPR);

    starsCanvas.width  = W * DPR;
    starsCanvas.height = H * DPR;
    starsCanvas.style.width  = W + 'px';
    starsCanvas.style.height = H + 'px';
    sCtx.scale(DPR, DPR);
    drawStars();
  }

  // ─── Static Stars ──────────────────────────────────────────────────────
  const STAR_COUNT = 180;
  let stars = [];

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        twinkleSpeed: 0.005 + Math.random() * 0.012,
        twinkleDir: Math.random() > 0.5 ? 1 : -1
      });
    }
  }

  function drawStars() {
    sCtx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      sCtx.beginPath();
      sCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(220,210,255,${s.a * 0.6})`;
      sCtx.fill();
    });
  }

  function updateStars() {
    let changed = false;
    stars.forEach(s => {
      s.a += s.twinkleSpeed * s.twinkleDir;
      if (s.a >= 1)   { s.a = 1;   s.twinkleDir = -1; changed = true; }
      if (s.a <= 0.05){ s.a = 0.05; s.twinkleDir = 1; changed = true; }
    });
    drawStars();
  }

  // ─── Particle System ───────────────────────────────────────────────────
  const PARTICLE_COUNT = 560;
  let particles = [];

  const COLORS = [
    [180, 100, 255],  // violet
    [255,  80, 180],  // rose
    [100, 160, 255],  // ice blue
    [255, 200, 100],  // gold
    [255, 120, 200],  // pink
    [140,  80, 255],  // purple
    [200, 240, 255],  // pale blue
  ];

  function randColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  class Particle {
    constructor(index) {
      this.index = index;
      this.reset(true);
    }

    reset(init) {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.35;
      this.vy = (Math.random() - 0.5) * 0.35;
      this.ax = 0; this.ay = 0;
      this.baseR   = Math.random() * 1.8 + 0.5;
      this.r       = this.baseR;
      this.color   = randColor();
      this.alpha   = 0.4 + Math.random() * 0.5;
      this.baseAlpha = this.alpha;
      this.life    = 1;
      this.drift   = { x: (Math.random()-0.5)*0.08, y: (Math.random()-0.5)*0.08 };
      this.phaseOffset = Math.random() * Math.PI * 2;
      // For supernova
      this.exploding   = false;
      this.explodeVX   = 0;
      this.explodeVY   = 0;
      this.reformTarget = null;
      this.reforming    = false;
      this.explodeFade  = 1;
    }

    update(t, touch, swipeVel) {
      if (this.exploding) {
        this.x += this.explodeVX;
        this.y += this.explodeVY;
        this.explodeVX *= 0.965;
        this.explodeVY *= 0.965;
        this.explodeFade -= 0.012;
        this.alpha = Math.max(0, this.explodeFade) * this.baseAlpha;
        this.r = this.baseR * (1 + (1 - this.explodeFade) * 2.5);
        if (this.explodeFade <= 0) {
          this.exploding = false;
          this.reforming = true;
          // Respawn off-screen edge
          const edge = Math.floor(Math.random() * 4);
          if (edge === 0) { this.x = -20; this.y = Math.random() * H; }
          else if (edge === 1) { this.x = W+20; this.y = Math.random() * H; }
          else if (edge === 2) { this.x = Math.random() * W; this.y = -20; }
          else { this.x = Math.random() * W; this.y = H+20; }
          this.explodeFade = 1;
          this.alpha = 0;
        }
        return;
      }

      if (this.reforming && this.reformTarget) {
        const dx = this.reformTarget.x - this.x;
        const dy = this.reformTarget.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        this.vx += dx * 0.04;
        this.vy += dy * 0.04;
        this.vx *= 0.82;
        this.vy *= 0.82;
        this.alpha = Math.min(this.baseAlpha, this.alpha + 0.018);
        this.r = this.baseR;
        if (dist < 2.5) {
          this.x = this.reformTarget.x;
          this.y = this.reformTarget.y;
          this.vx = 0; this.vy = 0;
          this.reforming    = false;
          this.reformTarget = null;
        }
      } else {
        // Gentle drift
        const pulse = Math.sin(t * 0.001 + this.phaseOffset) * 0.018;
        this.vx += this.drift.x + pulse;
        this.vy += this.drift.y + pulse * 0.7;
      }

      // Touch magnetic attraction
      if (touch.active) {
        const dx   = touch.x - this.x;
        const dy   = touch.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const maxR = 190;

        if (dist < maxR) {
          const force = (1 - dist / maxR) * 0.55;
          const swipeMag = Math.sqrt(swipeVel.x*swipeVel.x + swipeVel.y*swipeVel.y);

          if (swipeMag > 12) {
            // Repulsion on fast swipe
            this.vx -= (dx / dist) * force * 3.2;
            this.vy -= (dy / dist) * force * 3.2;
          } else {
            // Magnetic attraction
            this.vx += (dx / dist) * force * 0.9;
            this.vy += (dy / dist) * force * 0.9;
          }

          // Glow near touch
          const glow = Math.max(0, 1 - dist / maxR);
          this.r     = this.baseR + glow * 3.5;
          this.alpha = this.baseAlpha + glow * 0.45;
        } else {
          this.r     = this.baseR;
          this.alpha = this.baseAlpha;
        }
      } else {
        this.r     = this.baseR;
        this.alpha = this.baseAlpha;
      }

      // Friction & velocity clamp
      this.vx *= 0.975;
      this.vy *= 0.975;
      const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (speed > 6) { this.vx = (this.vx/speed)*6; this.vy = (this.vy/speed)*6; }

      this.x += this.vx;
      this.y += this.vy;

      // Wrap edges
      if (this.x < -10) this.x = W + 10;
      if (this.x > W+10) this.x = -10;
      if (this.y < -10) this.y = H + 10;
      if (this.y > H+10) this.y = -10;
    }

    draw(ctx) {
      const [r, g, b] = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${Math.max(0,Math.min(1,this.alpha))})`;
      ctx.fill();
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle(i));
    }
  }

  // ─── Touch / Pointer State ─────────────────────────────────────────────
  const touch = { active: false, x: W/2, y: H/2 };
  const swipeVel = { x: 0, y: 0 };
  let lastTX = 0, lastTY = 0, lastTTime = 0;

  // Gesture path recording
  let gesturePoints   = [];
  let isDrawing       = false;
  let gestureTimeout  = null;
  let messageShown    = false;
  let autoShowTimer   = null;
  let supernovaActive = false;
  let interactionTime = 0;
  let firstTouchTime  = null;

  function spawnPulse(x, y) {
    const el = document.createElement('div');
    el.className = 'pulse-ring';
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function onTouchStart(e) {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    touch.active = true;
    touch.x = t.clientX;
    touch.y = t.clientY;
    lastTX = t.clientX; lastTY = t.clientY;
    lastTTime = performance.now();
    swipeVel.x = 0; swipeVel.y = 0;
    isDrawing = true;
    gesturePoints = [{ x: t.clientX, y: t.clientY, t: Date.now() }];

    spawnPulse(t.clientX, t.clientY);

    if (!firstTouchTime) {
      firstTouchTime = Date.now();
      // Auto-show message after 10s of interaction
      autoShowTimer = setTimeout(() => {
        if (!messageShown) triggerSupernova();
      }, 10000);
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const now = performance.now();
    const dt  = Math.max(1, now - lastTTime);
    swipeVel.x = (t.clientX - lastTX) / dt * 16;
    swipeVel.y = (t.clientY - lastTY) / dt * 16;
    lastTX = t.clientX; lastTY = t.clientY;
    lastTTime = now;
    touch.x = t.clientX;
    touch.y = t.clientY;

    if (isDrawing) {
      gesturePoints.push({ x: t.clientX, y: t.clientY, t: Date.now() });
      addTrailPoint(t.clientX, t.clientY);
      if (gesturePoints.length > 320) gesturePoints.shift();
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    touch.active = false;
    swipeVel.x *= 0.2;
    swipeVel.y *= 0.2;
    isDrawing = false;
    if (gesturePoints.length > 30 && !messageShown && !supernovaActive) {
      analyzeGesture(gesturePoints);
    }
    gesturePoints = [];
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
  canvas.addEventListener('mousedown',  onTouchStart, { passive: false });
  canvas.addEventListener('mousemove',  e => { if (touch.active) onTouchMove(e); }, { passive: false });
  canvas.addEventListener('mouseup',    onTouchEnd,   { passive: false });

  // ─── Gesture Analysis ──────────────────────────────────────────────────
  function analyzeGesture(pts) {
    if (pts.length < 20) return;

    // Bounding box
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    pts.forEach(p => {
      if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
    });
    const bW = maxX - minX, bH = maxY - minY;
    if (bW < 40 || bH < 40) return; // too small

    // --- Circle Detection ---
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const radii = pts.map(p => Math.sqrt((p.x-cx)**2 + (p.y-cy)**2));
    const meanR = radii.reduce((a,b) => a+b, 0) / radii.length;
    const variance = radii.reduce((a,b) => a + (b-meanR)**2, 0) / radii.length;
    const stdDev = Math.sqrt(variance);
    const circleScore = stdDev / meanR; // low = circle

    // Check path closure (start ~= end)
    const first = pts[0], last = pts[pts.length - 1];
    const closeDist = Math.sqrt((first.x-last.x)**2 + (first.y-last.y)**2);
    const closureRatio = closeDist / meanR;

    // Angular traversal check (should wrap ~360 for circle)
    let totalAngle = 0;
    for (let i = 1; i < pts.length; i++) {
      const a1 = Math.atan2(pts[i-1].y - cy, pts[i-1].x - cx);
      const a2 = Math.atan2(pts[i].y   - cy, pts[i].x   - cx);
      let da = a2 - a1;
      if (da >  Math.PI) da -= 2*Math.PI;
      if (da < -Math.PI) da += 2*Math.PI;
      totalAngle += da;
    }
    const loopsAng = Math.abs(totalAngle) / (2 * Math.PI);

    const isCircle = circleScore < 0.32 && closureRatio < 0.65 && loopsAng > 0.7;

    // --- Heart Detection ---
    // A heart has: inverted-V at top, comes back to a point at bottom
    // Check: top half has two humps (local maxima in Y-flipped) and bottom converges to point
    const isHeart = detectHeart(pts, minX, minY, maxX, maxY);

    if (isHeart || isCircle) {
      triggerSupernova();
    }
  }

  function detectHeart(pts, minX, minY, maxX, maxY) {
    const bW = maxX - minX, bH = maxY - minY;
    // Aspect ratio check: heart is roughly as wide as tall
    if (bW < 50 || bH < 50) return false;
    const aspect = bW / bH;
    if (aspect < 0.4 || aspect > 2.6) return false;

    const cx = (minX + maxX) / 2;
    // Normalize points
    const norm = pts.map(p => ({ x: (p.x - minX) / bW, y: (p.y - minY) / bH }));

    // Heart bottom point should be near center-x and bottom
    // Find the lowest point (max y)
    let bottomPt = norm[0];
    norm.forEach(p => { if (p.y > bottomPt.y) bottomPt = p; });
    const bottomCentered = Math.abs(bottomPt.x - 0.5) < 0.3;

    // Find top area points (y < 0.5) — should have two humps: left and right
    const topPts = norm.filter(p => p.y < 0.55);
    const leftTop  = topPts.filter(p => p.x < 0.5);
    const rightTop = topPts.filter(p => p.x >= 0.5);

    const hasLeftHump  = leftTop.length > 3;
    const hasRightHump = rightTop.length > 3;

    // Path should go to extreme left and right
    const leftmostX  = Math.min(...norm.map(p => p.x));
    const rightmostX = Math.max(...norm.map(p => p.x));
    const spanning = leftmostX < 0.25 && rightmostX > 0.75;

    // Check start and end are close to top-center (where heart cleft is)
    const start = norm[0], end = norm[norm.length-1];
    const startOrEndTop = (start.y < 0.45 || end.y < 0.45);

    // Path length heuristic
    let pathLen = 0;
    for (let i = 1; i < pts.length; i++) {
      pathLen += Math.sqrt((pts[i].x-pts[i-1].x)**2 + (pts[i].y-pts[i-1].y)**2);
    }
    const perimeter = 2 * (bW + bH);
    const pathRatio = pathLen / perimeter;

    return bottomCentered && hasLeftHump && hasRightHump && spanning && startOrEndTop && pathRatio > 0.6;
  }

  // ─── Shockwave State ───────────────────────────────────────────────────
  let shockwaves = [];

  function spawnShockwave(x, y) {
    shockwaves.push({ x, y, r: 0, maxR: Math.max(W, H) * 0.85, alpha: 0.7 });
  }

  function renderShockwaves() {
    shockwaves = shockwaves.filter(s => s.alpha > 0.01);
    shockwaves.forEach(s => {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,140,210,${s.alpha * 0.6})`;
      ctx.lineWidth   = 2.5 * s.alpha;
      ctx.stroke();

      // Secondary ring
      if (s.r > 30) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 0.65, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(180,80,255,${s.alpha * 0.35})`;
        ctx.lineWidth   = 1.5 * s.alpha;
        ctx.stroke();
      }
      ctx.restore();

      s.r     += (s.maxR - s.r) * 0.06 + 2.5;
      s.alpha *= 0.955;
    });
  }

  // ─── Supernova Effect ──────────────────────────────────────────────────
  function triggerSupernova() {
    if (supernovaActive) return;
    supernovaActive = true;
    if (autoShowTimer) clearTimeout(autoShowTimer);
    hint.style.opacity = '0';
    trailPoints = [];

    // Flash
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 700);

    // Shockwave
    spawnShockwave(W/2, H/2);
    setTimeout(() => spawnShockwave(W/2, H/2), 220);

    // Burst all particles
    const cx = W / 2, cy = H / 2;
    particles.forEach(p => {
      const angle = Math.atan2(p.y - cy, p.x - cx) + (Math.random() - 0.5) * 0.9;
      const speed = 4 + Math.random() * 11;
      p.exploding    = true;
      p.reforming    = false;
      p.explodeVX    = Math.cos(angle) * speed;
      p.explodeVY    = Math.sin(angle) * speed;
      p.explodeFade  = 1;
      p.alpha        = p.baseAlpha * 1.4;
      p.color        = COLORS[Math.floor(Math.random() * COLORS.length)];
    });

    // Reform into heart shape after delay
    setTimeout(() => {
      assignReformTargets();
    }, 1500);

    // Show message overlay
    setTimeout(() => {
      showMessage();
    }, 3200);
  }

  // Heart shape point generator
  function heartPoint(t) {
    const scale = Math.min(W, H) * 0.21;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: W/2 + x * scale/17, y: H/2 - 30 + y * scale/17 };
  }

  function assignReformTargets() {
    const targetPts = [];
    const count = PARTICLE_COUNT;
    for (let i = 0; i < count; i++) {
      const t = (i / count) * Math.PI * 2;
      targetPts.push(heartPoint(t));
    }
    // Shuffle targets slightly
    for (let i = targetPts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [targetPts[i], targetPts[j]] = [targetPts[j], targetPts[i]];
    }
    particles.forEach((p, i) => {
      p.exploding    = false;
      p.reforming    = true;
      p.reformTarget = targetPts[i];
      p.alpha        = 0;
      p.color        = [255, 100 + Math.floor(Math.random()*80), 160 + Math.floor(Math.random()*60)];
    });
  }

  function showMessage() {
    messageShown = true;
    overlay.classList.add('visible');
  }

  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('visible');
    shockwaves = [];
    trailPoints = [];
    setTimeout(() => {
      supernovaActive = false;
      messageShown    = false;
      firstTouchTime  = null;
      particles.forEach(p => {
        p.reforming    = false;
        p.reformTarget = null;
        p.exploding    = false;
        p.explodeFade  = 1;
        p.x     = Math.random() * W;
        p.y     = Math.random() * H;
        p.vx    = (Math.random() - 0.5) * 0.4;
        p.vy    = (Math.random() - 0.5) * 0.4;
        p.alpha = p.baseAlpha;
        p.r     = p.baseR;
        p.color = randColor();
      });
      hint.style.opacity = '1';
    }, 2400);
  });

  // ─── Dynamic Background ────────────────────────────────────────────────
  function updateBackground() {
    if (!touch.active) return;
    // Measure density near touch
    let near = 0;
    particles.forEach(p => {
      const d = Math.sqrt((p.x-touch.x)**2 + (p.y-touch.y)**2);
      if (d < 120) near++;
    });
    const density = Math.min(1, near / 80);
    const xPct = (touch.x / W * 100).toFixed(1);
    const yPct = (touch.y / H * 100).toFixed(1);
    const h1 = Math.round(260 + density * 40);
    const h2 = Math.round(300 + density * 30);
    bg.style.background = `radial-gradient(ellipse at ${xPct}% ${yPct}%,
      hsl(${h1},60%,${8 + density*8}%) 0%,
      hsl(${h2},40%,${3 + density*4}%) 45%,
      #000008 100%)`;
  }

  // ─── Bloom / Glow Render ───────────────────────────────────────────────
  // Gesture trail rendering
  let trailPoints = [];
  function addTrailPoint(x, y) {
    trailPoints.push({ x, y, age: 0 });
    if (trailPoints.length > 80) trailPoints.shift();
  }

  function renderTrail() {
    if (trailPoints.length < 2) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 1; i < trailPoints.length; i++) {
      const p0 = trailPoints[i-1], p1 = trailPoints[i];
      const progress = i / trailPoints.length;
      const alpha = progress * 0.28;
      const r = Math.round(200 + progress * 55);
      const g = Math.round(80  + progress * 40);
      const b = Math.round(200 + progress * 55);
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth   = 1.5 * progress + 0.5;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
    // Age out trail
    trailPoints.forEach(p => p.age++);
    trailPoints = trailPoints.filter(p => p.age < 35);
  }

  function render(t) {
    ctx.clearRect(0, 0, W, H);

    // Deep space vignette
    const vig = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.85);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Bloom layer 1 — wide soft glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'blur(9px)';
    particles.forEach(p => {
      if (p.alpha < 0.05) return;
      const [r, g, b] = p.color;
      const glowAlpha = Math.max(0, Math.min(0.18, p.alpha * 0.22));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${glowAlpha})`;
      ctx.fill();
    });
    ctx.filter = 'none';
    ctx.restore();

    // Bloom layer 2 — tight inner glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'blur(2.5px)';
    particles.forEach(p => {
      if (p.alpha < 0.05) return;
      const [r, g, b] = p.color;
      const glowAlpha = Math.max(0, Math.min(0.35, p.alpha * 0.38));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 1.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${glowAlpha})`;
      ctx.fill();
    });
    ctx.filter = 'none';
    ctx.restore();

    // Core particles (crisp)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p => p.draw(ctx));
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // Shockwave rings
    renderShockwaves();

    // Gesture trail
    renderTrail();

    // Touch aura ring
    if (touch.active) {
      const grd = ctx.createRadialGradient(touch.x, touch.y, 0, touch.x, touch.y, 130);
      grd.addColorStop(0,   'rgba(255,140,210,0.09)');
      grd.addColorStop(0.6, 'rgba(180,80,255,0.04)');
      grd.addColorStop(1,   'rgba(255,140,210,0)');
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(touch.x, touch.y, 130, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Inner spark
      const spark = ctx.createRadialGradient(touch.x, touch.y, 0, touch.x, touch.y, 22);
      spark.addColorStop(0, 'rgba(255,200,240,0.22)');
      spark.addColorStop(1, 'rgba(255,140,210,0)');
      ctx.beginPath();
      ctx.arc(touch.x, touch.y, 22, 0, Math.PI * 2);
      ctx.fillStyle = spark;
      ctx.fill();
      ctx.restore();
    }

    // Swipe velocity decay
    swipeVel.x *= 0.88;
    swipeVel.y *= 0.88;
  }

  // ─── Main Loop ─────────────────────────────────────────────────────────
  let lastFrame = 0;
  function loop(t) {
    requestAnimationFrame(loop);
    const dt = t - lastFrame;
    lastFrame = t;

    updateStars();
    particles.forEach(p => p.update(t, touch, swipeVel));
    updateBackground();
    render(t);
  }

  // ─── Init ──────────────────────────────────────────────────────────────
  initStars();
  resize();
  initParticles();
  window.addEventListener('resize', () => { resize(); initParticles(); });
  requestAnimationFrame(loop);

})();
</script>
