<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOLLOW - 16-Bit Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; }
html,body{
  width:100%; height:100%;
  background:#050008;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'VT323',monospace;
}
#scaler{ position:relative; }
canvas{ display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

/* UI ELEMENTS */
#dlg{
  display:none; position:absolute; bottom:0; left:0; right:0;
  background:rgba(8,4,18,0.97); border-top:3px solid #6a3a90;
  padding:12px 14px 10px; z-index:40; cursor:pointer;
}
#dlgName{ color:#b080e0; font-size:22px; letter-spacing:2px; margin-bottom:4px; text-shadow: 2px 2px #3a1a50; }
#dlgText{ color:#d0c0e8; font-size:20px; line-height:1.4; min-height:56px; }
#dlgCue{ color:#5a3090; font-size:16px; text-align:right; margin-top:4px; animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#title{
  position:absolute; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:50; cursor:pointer;
}
#title h1{
  font-size:90px; letter-spacing:18px; color:#e0c0ff;
  text-shadow:4px 4px 0 #7030c0, 8px 8px 0 #4010a0; animation:glow 3s infinite;
}
@keyframes glow{ 0%,100%{opacity:0.9} 50%{opacity:1; text-shadow:4px 4px 0 #c060ff, 8px 8px 15px #7030d0;} }
#title .sub{ color:#6a4a90; font-size:18px; margin-top:10px; text-align:center; }
#title .tap{ color:#9a70d0; font-size:22px; margin-top:30px; animation:blink 1.5s infinite; }

#hud{ position:absolute; top:0; left:0; right:0; padding:8px 12px; display:flex; justify-content:space-between; z-index:30; pointer-events:none; }
#roomLbl{ color:#7a4a90; font-size:18px; letter-spacing:2px; text-shadow: 1px 1px #220a3a;}
#clueLbl{ color:#5a3870; font-size:18px; }

/* CONTROLS (slightly larger) */
#psWrap{ position:absolute; bottom:12px; right:12px; display:grid; grid-template-columns:40px 40px; gap:6px; z-index:45; }
.psb{ width:40px; height:40px; border-radius:50%; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; }
.psb.pressed{ transform:scale(0.85); opacity:0.6; }
#bSq{ background:#1e1230; color:#e080d0; border-color:#a060c0; }
#bTr{ background:#102818; color:#70e090; border-color:#50a070; }
#bO { background:#2a0f0f; color:#ff7070; border-color:#b05050; }
#bX { background:#10182a; color:#70a0ff; border-color:#5060b0; }

#dpad{ position:absolute; bottom:12px; left:12px; width:114px; height:114px; z-index:45; }
.db{ position:absolute; width:36px; height:36px; background:rgba(30,15,50,0.8); border:2px solid #7a4a90; border-radius:4px; color:#c0a0ff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.db.pressed{ background:#9040e0; color:#fff; }
#dU{ top:0; left:40px; } #dD{ top:78px; left:40px; } #dL{ top:39px; left:0; } #dR{ top:39px; left:78px; }
</style>
</head>
<body>
<div id="scaler">
  <canvas id="c"></canvas>
  <div id="hud"><span id="roomLbl">???</span><span id="clueLbl">◆ 0/3</span></div>
  <div id="dpad">
    <div class="db" id="dU">▲</div><div class="db" id="dD">▼</div>
    <div class="db" id="dL">◀</div><div class="db" id="dR">▶</div>
  </div>
  <div id="psWrap">
    <div class="psb" id="bSq">■</div><div class="psb" id="bTr">▲</div>
    <div class="psb" id="bO">●</div><div class="psb" id="bX">✕</div>
  </div>
  <div id="dlg"><div id="dlgName">???</div><div id="dlgText"></div><div id="dlgCue">▶ tap to continue</div></div>
  <div id="title">
    <h1>HOLLOW</h1>
    <div class="sub">Darkness consumes everything.<br>16-BIT RETRO ADVENTURE</div>
    <div class="tap">▸ tap to begin</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const NW = 480, NH = 640; // Increased resolution for 16-bit detail
canvas.width = NW; canvas.height = NH;

function resize(){
  const sc=document.getElementById('scaler');
  const scale=Math.min(window.innerWidth/NW, window.innerHeight/NH);
  sc.style.width =NW*scale+'px'; sc.style.height=NH*scale+'px';
  canvas.style.width =NW*scale+'px'; canvas.style.height=NH*scale+'px';
}
window.addEventListener('resize',resize); resize();

// 16-BIT PALETTE & UTILS
const C={
  ceil:'#120a20', ceilSh:'#080410',
  wall:'#361e54', wallSh:'#2e1a48', wallPat:'#22113d', wallDither:'#2a1848',
  floor:'#1e122a', floorSh:'#160d20', floorLine:'#2a1a3a', floorPat:'#1a0d26',
  doorFrm:'#2a1a0c', door1:'#5a3818', door2:'#6a4828', doorKnob:'#c8a020',
  sofa1:'#3a2060', sofa2:'#281448', sofaHL:'#5a3880', table1:'#4a3010', table2:'#3a2008',
  paper:'#d8ceb4', paperSh:'#b8b098',
  skin:'#d8a070', skinSh:'#b88050', hair:'#1a0c0a', shirt:'#2a3058', shoe:'#0a0a0a'
};

function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function circle(x,y,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }

// ── STATE ──
const G={
  scene:'title',
  player:{ x:200, y:400, facing:1, wf:0, moving:false },
  clues:[false,false,false],
  dlg:null, inDlg:false,
};
const SPEED=3, keys={};

const CLUES=[
  { id:0, cx:380, cy:315, lines:["A crumpled note...","'Don't go upstairs.'","The handwriting is... mine."] },
  { id:1, cx:80, cy:260, lines:["An old photo in a cracked frame.","A man stands here, grinning.","His face is scratched out with ink."] },
  { id:2, cx:430, cy:225, lines:["A heavy stopped clock.","3:17 AM.","I remember screaming at this exact time."] }
];

// INPUTS
document.addEventListener('keydown',e=>{ keys[e.key]=true; if(['Enter',' ','x','X'].includes(e.key)) act(); });
document.addEventListener('keyup',e=>keys[e.key]=false);

function setupCtrl(id,key){
  const b=document.getElementById(id);
  const on=()=>{keys[key]=true; b.classList.add('pressed');};
  const off=()=>{keys[key]=false; b.classList.remove('pressed');};
  b.addEventListener('touchstart',e=>{e.preventDefault();on();});
  b.addEventListener('touchend',e=>{e.preventDefault();off();});
  b.addEventListener('mousedown',on); b.addEventListener('mouseup',off);
}
setupCtrl('dU','ArrowUp'); setupCtrl('dD','ArrowDown');
setupCtrl('dL','ArrowLeft'); setupCtrl('dR','ArrowRight');
['bX','bO'].forEach(id=>document.getElementById(id).addEventListener('click',act));

function startGame(){
  if(G.scene!=='title') return;
  document.getElementById('title').style.transition='opacity 1s';
  document.getElementById('title').style.opacity='0';
  setTimeout(()=>{ document.getElementById('title').style.display='none'; G.scene='play'; },1000);
}
document.getElementById('title').addEventListener('click', startGame);

function act(){
  if(G.scene==='title'){startGame();return;}
  if(G.inDlg){
    G.dlg.idx++;
    if(G.dlg.idx<G.dlg.lines.length) typeLine(G.dlg.lines[G.dlg.idx]);
    else { G.inDlg=false; document.getElementById('dlg').style.display='none'; }
    return;
  }
  tryInteract();
}

function showDlg(name,lines){
  G.inDlg=true; G.dlg={name,lines,idx:0};
  document.getElementById('dlg').style.display='block';
  document.getElementById('dlgName').textContent=name;
  typeLine(lines[0]);
}

let _timer, _idx=0, _str='';
function typeLine(s){
  clearInterval(_timer); _str=s; _idx=0;
  _timer=setInterval(()=>{
    _idx++; document.getElementById('dlgText').textContent=_str.slice(0,_idx);
    if(_idx>=_str.length) clearInterval(_timer);
  },28);
}

function tryInteract(){
  for(const c of CLUES){
    if(Math.abs(G.player.x-c.cx)<50 && Math.abs(G.player.y-c.cy)<60){
      if(!G.clues[c.id]) G.clues[c.id]=true;
      showDlg('???', c.lines);
      updateHUD();
      return;
    }
  }
}

function updateHUD(){
  const n=G.clues.filter(Boolean).length;
  document.getElementById('clueLbl').textContent=`◆ ${n}/3`;
  if(n===3) document.getElementById('roomLbl').textContent='LIVING ROOM';
}

// ── NEW: 16-BIT DRAWING FUNCTIONS ──

function drawRoom16(){
  // Ceiling with shadow dither
  rect(0,0,NW,60,C.ceil);
  for(let x=0; x<NW; x+=4) rect(x+(x%8===0?0:2), 56, 2, 4, C.ceilSh);

  // Wall
  rect(0,60,NW,300,C.wall);
  rect(0,340,NW,20,C.wallSh); // Baseboard shadow

  // Detailed Door
  rect(100,100,100,240,C.doorFrm);
  rect(108,108,84,232,C.door1);
  // Panel details
  rect(116,PanelY=116,68,100,C.door2); rect(116,PanelY,2,100,C.doorFrm); rect(116,PanelY,68,2,C.doorFrm);
  rect(116,PanelY=230,68,100,C.door2); rect(116,PanelY,2,100,C.doorFrm); rect(116,PanelY,68,2,C.doorFrm);
  // Brass Knob
  circle(182,220,6,C.doorKnob); circle(180,218,2,'#ffdf60'); // Highlight

  // Sofa with Shading
  const sx=250, sy=300, sw=160, sh=60;
  rect(sx,sy,sw,sh,C.sofa2);
  rect(sx+4,sy+4,sw-8,sh-8,C.sofa1);
  rect(sx+10,sy+10,sw-20,6,C.sofaHL); // Top seat highlight
  // Armrests
  rect(sx,sy+10,18,sh-10,C.sofa2); rect(sx+2,sy+12,14,sh-14,C.sofa1);
  rect(sx+sw-18,sy+10,18,sh-10,C.sofa2); rect(sx+sw-16,sy+12,14,sh-14,C.sofa1);
  // Cushion lines
  rect(sx+sw/2-2,sy+12,4,sh-16,C.sofa2);

  // Detailed Table
  const tx=280, ty=325, tw=80;
  rect(tx,ty,tw,12,C.table2); rect(tx+2,ty+2,tw-4,8,C.table1); // Top
  rect(tx+10,ty+12,8,30,C.table2); rect(tx+tw-18,ty+12,8,30,C.table2); // Legs
  // Crumpled Note (The clue)
  rect(tx+20,ty-15,30,18,C.paperSh); rect(tx+18,ty-18,30,18,C.paper);

  // Detailed Floor
  rect(0,360,NW,NH-360,C.floor);
  for(let y=360; y<NH; y+=40) rect(0,y,NW,2,C.floorLine);
  // Dither floor edge
  for(let x=0; x<NW; x+=8) rect(x+(x%16===0?0:4), 360, 4, 4, C.floorPat);
}

function drawPlayer16(){
  const p=G.player;
  const anim = p.moving ? Math.sin(G.loopCount * 0.2) * 3 : 0;
  ctx.save();
  if(p.facing===-1){ ctx.translate(p.x*2+24,0); ctx.scale(-1,1); }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)'; circle(p.x+12,p.y+4,20);

  // Shoes
  rect(p.x+anim,   p.y-5, 10,6, C.shoe);
  rect(p.x-anim+12,p.y-5, 10,6, C.shoe);

  // Detailed Body
  rect(p.x,p.y-60,24,45,C.ceilSh); // Shirt dark outline
  rect(p.x+2,p.y-58,20,41,C.shirt); // Shirt main
  rect(p.x+6,p.y-58,12,8,C.wallPat); // Vest/Detail

  // Head with simple shading
  rect(p.x+2,p.y-92,20,28,C.ceilSh); // Outline
  rect(p.x+4,p.y-90,16,24,C.skin); // Face
  rect(p.x+12,p.y-90,8,24,C.skinSh); // Face shadow
  // Hair complete covers face top
  rect(p.x+2,p.y-92,20,12,C.hair); rect(p.x+2,p.y-80,4,10,C.hair); rect(p.x+18,p.y-80,4,10,C.hair);
  // Eyes (16-bit detail)
  rect(p.x+7,p.y-78,2,3,C.ceilSh); rect(p.x+15,p.y-78,2,3,C.ceilSh);

  ctx.restore();
}

// ── DYNAMIC LIGHTING ──
function drawLighting(){
  if(G.scene==='title') return;
  const p = G.player;
  // We use a softer, slightly purple-tinted darkness
  const grad = ctx.createRadialGradient(
    p.x + 12, p.y - 60, 30,   // Inner circle
    p.x + 12, p.y - 60, 180   // Outer circle
  );
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.4, 'rgba(10,5,25,0.4)');
  grad.addColorStop(1, 'rgba(8,2,15,0.98)'); // Very dark purple
  
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,NW,NH);
}

function update(){
  if(G.inDlg || G.scene==='title') return;
  G.player.moving=false;
  if(keys['ArrowLeft']){ G.player.x-=SPEED; G.player.facing=-1; G.player.moving=true; }
  if(keys['ArrowRight']){ G.player.x+=SPEED; G.player.facing=1; G.player.moving=true; }
  if(keys['ArrowUp']){ G.player.y-=SPEED; G.player.moving=true; }
  if(keys['ArrowDown']){ G.player.y+=SPEED; G.player.moving=true; }
  G.player.x=Math.max(15,Math.min(NW-40,G.player.x));
  G.player.y=Math.max(370,Math.min(500,G.player.y));
}

G.loopCount = 0;
function loop(){
  G.loopCount++;
  update();
  ctx.clearRect(0,0,NW,NH);
  drawRoom16();
  drawPlayer16();
  drawLighting(); // Spot light follows player
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
